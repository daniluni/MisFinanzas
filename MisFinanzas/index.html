<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MisFinanzas — Control de Gastos</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <header class="app-header">
    <a href="../index.html" style="color:inherit;text-decoration:none;opacity:.7;font-size:.85rem;white-space:nowrap;margin-right:var(--space-md)">← Volver</a>
    <div class="app-header__brand">
      <span class="app-header__brand-icon">💰</span>
      <span>MisFinanzas</span>
    </div>
    <div style="display:flex;align-items:center;gap:var(--space-sm)">
      <button class="btn btn--ghost" id="btnConfig">⚙️ Categorías</button>
    </div>
  </header>

  <nav class="app-tabs">
    <button class="app-tab app-tab--active" data-view="viewDashboard">
      📊 Dashboard
    </button>
    <button class="app-tab" data-view="viewTransactions">
      📋 Transacciones
    </button>
  </nav>

  <!-- ============ DASHBOARD ============ -->
  <section class="app-view app-view--active" id="viewDashboard">

    <div class="balance-display">
      <div class="balance-display__label">Saldo Actual</div>
      <div class="balance-display__amount" id="balanceAmount">$0.00</div>
      <div class="balance-display__actions">
        <button class="btn btn--primary btn--sm" id="btnEditBalance">✏️ Editar saldo</button>
      </div>
      <div style="margin-top:var(--space-xs);font-size:var(--font-size-sm);color:var(--color-text-secondary)" id="balanceLabel"></div>
    </div>

    <div class="dashboard-grid">
      <div class="card card--income">
        <div class="card__label">Ingresos del Mes</div>
        <div class="card__value card__value--positive" id="totalIngresos">$0.00</div>
      </div>
      <div class="card card--expense">
        <div class="card__label">Gastos del Mes</div>
        <div class="card__value card__value--negative" id="totalEgresos">$0.00</div>
      </div>
      <div class="card card--balance">
        <div class="card__label">Balance del Mes</div>
        <div class="card__value card__value--primary" id="balanceMensual">$0.00</div>
      </div>
    </div>

    <div class="dashboard-charts">
      <div class="chart-container">
        <div class="chart-container__title">Gastos por Categoría</div>
        <canvas id="pieChart"></canvas>
      </div>
      <div class="chart-container">
        <div class="chart-container__title">Ingresos vs Gastos</div>
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <div class="dashboard-recent">
      <h3 style="font-size:var(--font-size-md);font-weight:700;margin-bottom:var(--space-md);color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px">Últimas Transacciones</h3>
      <div id="recentTransactions"></div>
    </div>
  </section>

  <!-- ============ TRANSACCIONES ============ -->
  <section class="app-view" id="viewTransactions">

    <div class="transactions-header">
      <button class="btn btn--primary" id="btnNuevaTransaccion">+ Nueva Transacción</button>
      <div class="transactions-filters">
        <select class="form-select" id="filterTipo" style="width:auto">
          <option value="">Todos los tipos</option>
          <option value="ingreso">Ingresos</option>
          <option value="egreso">Gastos</option>
        </select>
        <select class="form-select" id="filterCategoria" style="width:auto"></select>
        <input class="form-input" type="date" id="filterFechaDesde" style="width:auto;padding:var(--space-xs) var(--space-sm)" title="Desde" />
        <input class="form-input" type="date" id="filterFechaHasta" style="width:auto;padding:var(--space-xs) var(--space-sm)" title="Hasta" />
      </div>
    </div>

    <div class="transactions-table-wrap">
      <div id="transactionsList"></div>
    </div>
  </section>

  <!-- ============ MODAL: TRANSACCIÓN ============ -->
  <div class="modal-overlay" id="txFormOverlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="txFormTitle">Nueva Transacción</h2>
        <button class="btn btn--secondary btn--sm" id="txFormCancel">✕</button>
      </div>
      <form class="modal__body" id="txForm">
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <div class="form-type-toggle">
            <button type="button" class="form-type-toggle__btn form-type-toggle__btn--ingreso form-type-toggle__btn--active" data-tipo="ingreso">💰 Ingreso</button>
            <button type="button" class="form-type-toggle__btn form-type-toggle__btn--egreso" data-tipo="egreso">💸 Gasto</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="txMonto">Monto *</label>
          <input class="form-input" type="number" id="txMonto" placeholder="0.00" min="0.01" step="0.01" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="txDescripcion">Descripción</label>
          <input class="form-input" type="text" id="txDescripcion" placeholder="Ej: Compra de despensa" maxlength="200" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="txFecha">Fecha</label>
            <input class="form-input" type="date" id="txFecha" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="txCategoria">Categoría *</label>
            <select class="form-select" id="txCategoria" required></select>
          </div>
        </div>
        <div class="modal__footer" style="padding:var(--space-md) 0 0">
          <button type="button" class="btn btn--secondary" id="txFormCancel2">Cancelar</button>
          <button type="submit" class="btn btn--success" id="txFormSubmit">Agregar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============ MODAL: CATEGORÍAS ============ -->
  <div class="modal-overlay modal--config" id="configOverlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Categorías</h2>
        <button class="btn btn--secondary btn--sm" id="configCancel">✕</button>
      </div>
      <div class="modal__body">
        <form id="catForm" style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-lg)">
          <input class="form-input" type="text" id="catNombre" placeholder="Nombre" style="flex:1;min-width:120px" required />
          <select class="form-select" id="catTipo" style="width:auto">
            <option value="egreso">Gasto</option>
            <option value="ingreso">Ingreso</option>
          </select>
          <input class="form-input" type="color" id="catColor" value="#3498db" style="width:48px;flex-shrink:0" />
          <button type="submit" class="btn btn--primary btn--sm" id="catFormSubmit">Agregar</button>
        </form>
        <div id="categoriasList"></div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" id="configCancel2">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/models.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/transactions.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
